<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desserts & Drinks</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f6f8;
      margin: 0;
      padding: 2em;
      text-align: center;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 1em;
    }

    .container {
      background: white;
      padding: 2em;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      max-width: 700px;
      margin: auto;
    }

    .form-group {
      margin: 1em 0;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 0.5em;
      font-weight: bold;
    }

    input[type="number"],
    select {
      padding: 0.5em;
      width: 100%;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .checkboxes {
      display: flex;
      justify-content: center;
      gap: 2em;
      margin: 1em 0;
    }

    .checkboxes label {
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-size: 1.1em;
    }

    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 0.8em 2em;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 1.5em;
    }

    button:hover {
      background-color: #45a049;
    }

    .results {
      margin-top: 2em;
      text-align: left;
    }

    .result-section {
      background: white;
      margin: 1em auto;
      padding: 1em 2em;
      border-radius: 10px;
      box-shadow: 0 0 6px rgba(0,0,0,0.05);
      max-width: 600px;
    }

    .result-item {
      display: flex;
      align-items: center;
      margin-bottom: 1em;
    }

    .result-item img {
      width: 64px;
      height: 64px;
      border-radius: 5px;
      margin-right: 1em;
    }

    .result-item a {
      font-weight: bold;
      text-decoration: none;
      color: #004aad;
    }

    .result-item a:hover {
      text-decoration: underline;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: #ffffff;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 0.8em 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
      font-weight: bold;
    }

    .bottom-nav a {
      color: #333;
      text-decoration: none;
      font-size: 1em;
    }

    .bottom-nav a:hover {
      color: #4CAF50;
    }
  </style>
</head>
<body>

  <h1>Desserts & Drinks</h1>

  <div class="container">
    <div class="checkboxes">
      <label><input type="checkbox" name="extraType" value="dessert"> 🍰 Dessert</label>
      <label><input type="checkbox" name="extraType" value="drink"> 🥤 Drink</label>
    </div>

    <div class="form-group">
      <label for="maxDessertCalories">Max Calories (Dessert)</label>
      <input type="number" id="maxDessertCalories" value="400" min="1">
    </div>

    <div class="form-group">
      <label for="maxDrinkCalories">Max Calories (Drink)</label>
      <input type="number" id="maxDrinkCalories" value="250" min="1">
    </div>

    <div class="form-group">
      <label for="numResults">How many per type?</label>
      <select id="numResults">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
      </select>
    </div>

    <button id="generateExtras">Generate</button>

    <div class="results" id="extrasResults"></div>
  </div>

  <nav class="bottom-nav">
    <a href="{{ url_for('dashboard.dashboard_view') }}">Home</a>
    <a href="/browse">Browse Meals</a>
    <a href="/my-plan">My Plan</a>
    <a href="{{ url_for('auth.logout') }}">Logout</a>
  </nav>

  <script>
    document.getElementById("generateExtras").addEventListener("click", async () => {
      const types = [...document.querySelectorAll("input[name='extraType']:checked")].map(cb => cb.value);
      const maxDessert = document.getElementById("maxDessertCalories").value;
      const maxDrink = document.getElementById("maxDrinkCalories").value;
      const number = document.getElementById("numResults").value;

      const response = await fetch("/extras", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          types,
          maxDessertCalories: parseInt(maxDessert),
          maxDrinkCalories: parseInt(maxDrink),
          number: parseInt(number)
        })
      });

      const data = await response.json();
      const resultsDiv = document.getElementById("extrasResults");
      resultsDiv.innerHTML = "";

      types.forEach(type => {
        const section = document.createElement("div");
        section.className = "result-section";
        section.innerHTML = `<h3>${type[0].toUpperCase() + type.slice(1)}s</h3>`;

        const items = data[type] || [];
        if (items.length === 0) {
          section.innerHTML += `<p style="color:red;">No ${type}s found within calorie limit.</p>`;
        } else {
          items.forEach(recipe => {
            section.innerHTML += `
              <div class="result-item">
                <img src="${recipe.image}" alt="${recipe.title}">
                <div>
                  <a href="${recipe.sourceUrl}" target="_blank">${recipe.title}</a><br>
                  <span>Calories: ${Math.round(
                    recipe.nutrition?.nutrients?.find(n => n.name === "Calories")?.amount || 0
                  )}</span>
                </div>
              </div>
            `;
          });
        }
        resultsDiv.appendChild(section);
      });
    });
  </script>
</body>
</html>
