<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mealano</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f6f8;
      text-align: center;
      margin: 0;
      padding: 2em;
    }
    header h1 {
      font-size: 2.5em;
      margin-bottom: 2em;
    }
    .diet-box {
      display: inline-block;
      background: white;
      padding: 2em;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      margin-top: 2em;
    }
    .diet-options {
      margin: 2em 0;
    }
    .diet {
      padding: 0.5em 1em;
      margin: 0.2em;
      border: 1px solid #ccc;
      border-radius: 5px;
      cursor: pointer;
    }
    .diet.selected {
      background-color: lightgreen;
    }
    .macro-notes li {
      list-style: none;
      margin: 0.5em 0;
    }
    .popup {
      display: none;
      background: #4CAF50;
      color: white;
      padding: 1em;
      margin-bottom: 2em;
      border-radius: 5px;
      width: fit-content;
      margin-inline: auto;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: #ffffff;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 0.8em 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
      font-weight: bold;
    }
    .bottom-nav a {
      color: #333;
      text-decoration: none;
      font-size: 1em;
    }
    .bottom-nav a:hover {
      color: #4CAF50;
    }
    .meal-section {
      text-align: left;
      max-width: 600px;
      margin: 2em auto;
      background: white;
      padding: 1em 2em;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    .meal-section h3 {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meal-item {
      display: flex;
      align-items: center;
      margin-bottom: 1em;
    }
    .meal-item img {
      width: 64px;
      height: 64px;
      border-radius: 5px;
      margin-right: 1em;
    }
    .meal-item a {
      font-weight: bold;
      text-decoration: none;
      color: #004aad;
    }
    .meal-item a:hover {
      text-decoration: underline;
    }
    .meal-section span {
      color: #666;
      font-size: 0.9em;
    }
    .refresh-btn {
      cursor: pointer;
      font-size: 1.2em;
    }
    .health-options {
      margin-top: 1em;
      text-align: left;
    }
    .health-options h4 {
      margin-bottom: 0.5em;
      font-size: 1.1em;
      font-weight: bold;
    }
    .health-choice {
      display: flex;
      flex-direction: column;
      gap: 0.4em;
      padding: 0.5em 1em;
      background: #f0f0f0;
      border-radius: 8px;
    }
    .health-choice label {
      font-size: 0.95em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mealano 🥄</h1>
  </header>

  <main>
    <div class="popup" id="successPopup">Logged in successfully!</div>

    <h2>Create your meal plan right here in seconds</h2>

    <div class="diet-box">
      <h3>Preferred Diet</h3>

      <div class="diet-options">
        <button class="diet selected">Anything</button>
        <button class="diet">Keto</button>
        <button class="diet">Mediterranean</button>
        <button class="diet">Paleo</button>
        <button class="diet">Vegan</button>
        <button class="diet">Vegetarian</button>
      </div>

      <div class="calorie-form">
        <label for="calories">I want to eat</label>
        <input type="number" name="calories" value="1800" min="0"> calories per day.
        <br><br>
        in
        <select name="meals">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select> meals
      </div>

      <div class="macro-notes">
        <ul>
          <li style="color: orange;">● Carbs (g): <span id="carbs-val">90</span></li>
          <li style="color: teal;">● Fat (g): <span id="fat-val">40</span></li>
          <li style="color: purple;">● Protein (g): <span id="protein-val">0</span></li>
        </ul>
      </div>

      <div class="health-options">
        <h4>Health Preference</h4>
        <div class="health-choice">
          <label><input type="radio" name="health" value="veryHealthy"> 💚 Very Healthy</label>
          <label><input type="radio" name="health" value="mediumHealthy"> 💛 In between Healthy and Unhealthy</label>
          <label><input type="radio" name="health" value="noPreference" checked> 🩶 I don’t care</label>
        </div>
      </div>

      <div>
        <button class="generate-btn">Generate</button>
      </div>
    </div>

    <div id="recipe-results"></div>
  </main>

  <nav class="bottom-nav">
    <a href="/browse">Browse Meals</a>
    <a href="/my-plan">My Meal Plan</a>
    <a href="{{ url_for('dessert_drinks_page.dessert_view') }}">Dessert/Drinks</a>
    <a href="{{ url_for('auth.logout') }}">Logout</a>
  </nav>

  <script>
    const macrosByDiet = {
      "Anything": { minCarbs: 90, minFat: 40, minProtein: 90 },
      "Keto": { minCarbs: 0, maxCarbs: 41, minFat: 120, minProtein: 68 },
      "Mediterranean": { minCarbs: 45, minFat: 40, minProtein: 45 },
      "Paleo": { minCarbs: 45, minFat: 40, minProtein: 45 },
      "Vegan": { minCarbs: 45, minFat: 40, minProtein: 45 },
      "Vegetarian": { minCarbs: 45, minFat: 40, minProtein: 45 }
    };

    let selectedDiet = "Anything";

    document.addEventListener("DOMContentLoaded", function () {
      const buttons = document.querySelectorAll(".diet");
      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          buttons.forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          selectedDiet = btn.innerText;
          const macros = macrosByDiet[selectedDiet];
          document.getElementById("carbs-val").innerText = macros.minCarbs + (macros.maxCarbs ? ` (max: ${macros.maxCarbs})` : "");
          document.getElementById("fat-val").innerText = macros.minFat;
          document.getElementById("protein-val").innerText = macros.minProtein;
        });
      });

      const popup = document.getElementById("successPopup");
      if (popup) {
        popup.style.display = "block";
        setTimeout(() => popup.style.display = "none", 3000);
      }

      document.querySelector(".generate-btn").addEventListener("click", async () => {
        const calories = document.querySelector("input[name='calories']").value;
        const meals = parseInt(document.querySelector("select[name='meals']").value);
        const health = document.querySelector('input[name="health"]:checked').value;
        const macros = macrosByDiet[selectedDiet];

        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            diet: selectedDiet,
            calories,
            meals,
            minCarbs: macros.minCarbs,
            minFat: macros.minFat,
            minProtein: macros.minProtein,
            maxCarbs: macros.maxCarbs || null,
            healthPreference: health
          })
        });

        const data = await res.json();
        const resultsContainer = document.getElementById("recipe-results");
        resultsContainer.innerHTML = "";

        const makeSection = (title, recipes) => {
          const section = document.createElement("div");
          section.className = "meal-section";
          section.innerHTML = `<h3>${title} <span class="refresh-btn" title="Refresh">🔄</span></h3>`;

          if (!recipes || recipes.length === 0 || recipes.error) {
            section.innerHTML += `<p style="color: red;">No suitable ${title} recipe found for your preferences.</p>`;
            return section;
          }

          const totalCalories = recipes.reduce((sum, r) => {
            const cals = r.nutrition?.nutrients?.find(n => n.name === "Calories")?.amount || 0;
            return sum + cals;
          }, 0);

          section.innerHTML += `<span>~ ${Math.round(totalCalories)} Calories</span><br><br>`;

          recipes.forEach(r => {
            section.innerHTML += `
              <div class="meal-item">
                <img src="${r.image}" alt="${r.title}">
                <div>
                  <a href="${r.sourceUrl}" target="_blank">${r.title}</a><br>
                  <span>1 serving</span>
                </div>
              </div>
            `;
          });

          return section;
        };

        const mealKeys = Object.keys(data);
        if (mealKeys.length === 0) {
          resultsContainer.innerHTML = "<p>No meals found.</p>";
          return;
        }

        mealKeys.forEach(mealKey => {
          const title = mealKey.charAt(0).toUpperCase() + mealKey.slice(1);
          const section = makeSection(title, data[mealKey]);
          if (section) resultsContainer.appendChild(section);
        });
      });
    });
  </script>
</body>
</html>
